<section class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8 space-y-6">
  <header>
    <h1 class="text-2xl font-semibold text-slate-100">Transferir entre benefícios</h1>
    <p class="text-slate-400 text-sm mt-1">
      Selecione origem, destino e o valor. A operação é atômica com lock pessimista no servidor.
    </p>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-[1fr_1fr_1fr] gap-4 sm:gap-6 items-stretch">

    <app-beneficios-picker
      titulo="Origem"
      placeholder="Buscar origem..."
      [opcoes]="opcoesOrigem()"
      [selectedId]="origem()?.id ?? null"
      (selecionado)="selecionarOrigem($event)"
    />

    <app-simulacao-transferencia
      [origem]="origem() ?? undefined"
      [destino]="destino() ?? undefined"
      [(amount)]="amount"
    />

    <app-beneficios-picker
      titulo="Destino"
      placeholder="Buscar destino..."
      [opcoes]="opcoesDestino()"
      [selectedId]="destino()?.id ?? null"
      (selecionado)="selecionarDestino($event)"
    />
  </div>

  <div class="flex flex-col-reverse sm:flex-row sm:items-center sm:justify-end gap-2">
    <app-button variant="ghost" (click)="cancelar()">Cancelar</app-button>
    <app-button
      type="button"
      variant="primary"
      [loading]="enviando()"
      [disabled]="!podeEnviar()"
      (click)="transferir()"
    >
      @if (valor() > 0) {
        Transferir {{ valor() | currency: 'BRL' }}
      } @else {
        Transferir
      }
    </app-button>
  </div>
</section>
